

services:

  db:
    image: postgres:16
    container_name: mindexa-db
    restart: always
    environment:
      POSTGRES_DB: mindexa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  backend:


    environment:
      DB_URL: jdbc:postgresql://db:5432/mindexa
      DB_USER: postgres
      DB_PASSWORD: postgres

    build: ../backend
    container_name: mindexa-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    restart: always

  frontend:
    build: ../frontend
    container_name: mindexa-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"